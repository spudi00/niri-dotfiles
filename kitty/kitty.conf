confirm_os_window_close 0

cursor_trail 3
cursor_trail_decay 0.1 0.4

enable_audio_bell no

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family='SF Mono' postscript_name=SFMono-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

window_padding_width 10

background_opacity 0.8
